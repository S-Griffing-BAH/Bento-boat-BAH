# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: DevSkim

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '33 2 * * 2'

jobs:
  lint:
    name: DevSkim
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run DevSkim scanner
        uses: microsoft/DevSkim-Action@v1
        with:
          # DS187371 ("weak cipher mode") false-positives on the bare word "CMC" —
          # this project's own component abbreviation for a common-mode choke
          # (a real EMI-hardening part on every EMI-hardened board), not a
          # reference to a cipher mode. Confirmed 2026-07-03: every hit in this
          # PR was "CMC" in EE prose/schematic reference-designator text (e.g.
          # KiCad's generated `(property "Reference" "CMC" ...)` field, which
          # cannot be reworded without breaking the schematic). Most avoidable
          # prose usages were reworded to "common-mode choke" instead; this
          # exclusion covers the remaining unavoidable case and any future
          # recurrence of this same false-positive class.
          exclude-rules: DS187371

      - name: Upload DevSkim scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: devskim-results.sarif
