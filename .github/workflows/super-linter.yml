---
# This workflow executes several linters on changed files based on
# languages used in your code base whenever you push code or open a
# pull request.
#
# You can adjust the behavior by modifying this file.
# For more information, see:
# https://github.com/github/super-linter
name: Lint Code Base

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  statuses: write

jobs:
  run-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Full git history is needed to get a proper list of
          # changed files within `super-linter`
          fetch-depth: 0

      - name: Lint Code Base
        uses: github/super-linter@v4
        env:
          VALIDATE_ALL_CODEBASE: false
          DEFAULT_BRANCH: "main"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PYTHON_FLAKE8 disabled: ci.yml's dedicated "Python lint" job already
          # runs flake8 (and gates STL Validation on it via `needs:`) -- running
          # it a second time here via super-linter was a pure duplicate check.
          # super-linter still covers Python via black/isort/mypy/pylint, which
          # ci.yml does not.
          VALIDATE_PYTHON_FLAKE8: false

