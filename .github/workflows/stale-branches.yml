name: Stale Branches Cleanup

on:
  schedule:
    # Runs daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  cleanup-branches:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clean up stale merged branches
        run: |
          # Get current date in Unix timestamp
          CURRENT_DATE=$(date +%s)
          THREE_DAYS_AGO=$((CURRENT_DATE - 3 * 24 * 60 * 60))
          
          # Fetch all branches
          git fetch --all
          
          # Get list of merged branches (excluding main/master)
          MERGED_BRANCHES=$(git branch -r --merged origin/main | grep -v 'origin/main' | sed 's|origin/||g')
          
          for branch in $MERGED_BRANCHES; do
            # Skip if branch is main or master
            if [[ "$branch" == "main" || "$branch" == "master" ]]; then
              continue
            fi
            
            # Get the last commit date for this branch
            LAST_COMMIT_DATE=$(git log -1 --format=%ci origin/$branch | cut -d' ' -f1)
            LAST_COMMIT_TIMESTAMP=$(date -d "$LAST_COMMIT_DATE" +%s)
            
            # Check if branch is older than 3 days
            if [ $LAST_COMMIT_TIMESTAMP -lt $THREE_DAYS_AGO ]; then
              echo "Deleting stale branch: $branch"
              git push origin --delete $branch
            else
              echo "Keeping branch (recent commits): $branch"
            fi
          done

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
